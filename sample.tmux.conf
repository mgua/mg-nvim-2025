#.tmux.conf by mgua@tomware.it
# this should be in the config of the user from which we launch tmux.
# if we launch tmux from root this has to go in root folder
#
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#
# Tmux Plugin Manager - (must be near top)
set -g @plugin 'tmux-plugins/tpm'
# clip supporting OSC-52 (ok from windows terminal)
set -g set-clipboard on
set -g mouse on
set -g history-limit 50000
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
# reload config with CTRL-b r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."
# Your plugins (install with CTRL-b I)
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
# Initialize TPM (must be the LAST line)
run '~/.tmux/plugins/tpm/tpm'

